services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: stevenuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: incentirise
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://stevenuser:${DB_PASSWORD}@db:5432/incentirise
    volumes:
      - ./backend/logs:/app/logs
    depends_on:
      - db
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
volumes:
  postgres_data:
