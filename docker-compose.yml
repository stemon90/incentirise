services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://stevenuser:${DB_PASSWORD}@${RDS_ENDPOINT}:5432/incentirise?sslmode=require
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    volumes:
      - ./backend/logs:/app/logs
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
